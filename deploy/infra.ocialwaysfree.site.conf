# nginx vhost for InfraDocs V6.
#
# This is the canonical source of truth for the site config — copy it to
# /etc/nginx/sites-available/infra.ocialwaysfree.site and symlink into
# sites-enabled (see deploy/install_nginx.sh).
#
# Pattern mirrors home.ocialwaysfree.site:
#   :80 -> 301 to :443
#   :443 -> static-serve the built React app + proxy /api/ to the FastAPI
#   wildcard Let's Encrypt cert at /etc/letsencrypt/live/ocialwaysfree.site/
#
# Other sites on this box are left untouched.

server {
    listen 80;
    server_name infra.ocialwaysfree.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name infra.ocialwaysfree.site;

    ssl_certificate     /etc/letsencrypt/live/ocialwaysfree.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocialwaysfree.site/privkey.pem;

    client_max_body_size 50M;

    # Static React build
    root /home/msinha/projects/InfraDocs_V6/frontend/dist;
    index index.html;

    # SPA fallback — React Router handles routes client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8004/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    # Long cache for hashed asset files (vite emits content-hashed names)
    location /assets/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
