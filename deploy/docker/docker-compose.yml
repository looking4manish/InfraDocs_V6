# InfraDocs — self-contained deployable stack: Mongo + API(+scanners) + Caddy web.
# Deploy on any Ubuntu/Linux host: `cp .env.example .env`, edit, `docker compose up -d`.
#
# The API runs on the HOST network + PID namespace and mounts the host read-only so
# its scanners see the real machine (proven: all 8 scanners match the host). It needs
# docker.sock + /run/systemd to manage docker & systemd on the host.
name: infradocs

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["--quiet"]
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:${MONGO_PORT:-27018}:27017"

  api:
    image: infradocs-api:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    network_mode: host          # port scanner needs host net; also reaches mongo on localhost
    pid: host                   # /proc/1/mounts (storage) + process mapping (ports)
    environment:
      INFRADOCS_MONGO_URI: "mongodb://localhost:${MONGO_PORT:-27018}/"
      INFRADOCS_API_USERNAME: "${ADMIN_USER:-admin}"
      INFRADOCS_API_PASSWORD: "${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}"
      INFRADOCS_API_PORT: "${API_PORT:-8090}"
      INFRADOCS_HOST_ROOT: "/host"
      INFRADOCS_SERVER_ID: "${SERVER_ID:-infradocs}"
      INFRADOCS_SERVER_NAME: "${SERVER_NAME:-${SERVER_ID:-infradocs}}"
      INFRADOCS_PROJECTS_ROOT: "${PROJECTS_ROOT:-/home/youruser/projects}"
    volumes:
      - /:/host:ro                                  # real host disk (read-only) for storage
      - /var/run/docker.sock:/var/run/docker.sock   # docker scan + actions
      - /etc/nginx:/etc/nginx:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - "${PROJECTS_ROOT:-/home/msinha/projects}:${PROJECTS_ROOT:-/home/msinha/projects}:ro"
      - /etc/cron.d:/etc/cron.d:ro
      - /etc/crontab:/etc/crontab:ro
      - /etc/cron.daily:/etc/cron.daily:ro
      - /run/systemd:/run/systemd
      - /run/dbus:/run/dbus
    depends_on:
      - mongo

  web:
    image: infradocs-web:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8081}:80"
      - "${WEB_TLS_PORT:-8443}:443"
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
      API_UPSTREAM: "http://host.docker.internal:${API_PORT:-8090}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - caddy_data:/data       # persists Let's Encrypt certs
    depends_on:
      - api

  # --- Exposure backends — opt-in via COMPOSE_PROFILES in .env -------------
  # Cloudflare Tunnel: a public URL on ANY host (incl. behind NAT/CGNAT). Make a
  # tunnel in CF Zero Trust, route your hostname -> http://localhost:${WEB_PORT},
  # set CF_TUNNEL_TOKEN + COMPOSE_PROFILES=cloudflare.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["cloudflare"]
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:-}
    depends_on:
      - web

  # Tailscale Funnel: a public URL with NO domain (https://<host>.<tailnet>.ts.net).
  # Needs Funnel+HTTPS enabled on the tailnet and a reusable auth key as TS_AUTHKEY;
  # set COMPOSE_PROFILES=tailscale.
  tailscale:
    image: tailscale/tailscale:latest
    profiles: ["tailscale"]
    restart: unless-stopped
    network_mode: host
    cap_add: ["NET_ADMIN"]
    environment:
      TS_AUTHKEY: "${TS_AUTHKEY:-}"
      WEB_PORT: "${WEB_PORT:-8081}"
      TS_HOSTNAME: "${SERVER_ID:-infradocs}"
    volumes:
      - tailscale_state:/var/lib/tailscale
    command: >
      sh -c "tailscaled --tun=userspace-networking --state=/var/lib/tailscale/tailscaled.state &
             sleep 3 &&
             tailscale up --authkey=\"$$TS_AUTHKEY\" --hostname=\"$$TS_HOSTNAME\" &&
             tailscale funnel --bg $$WEB_PORT &&
             wait"
    depends_on:
      - web

volumes:
  mongo_data:
  caddy_data:
  tailscale_state:
