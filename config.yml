# InfraDocs V6 Configuration — OCI-only
# V6 collapses V5's distributed architecture to a single host.
# Multi-server support will be reintroduced after V6 reaches production quality.

server:
  id: oci
  name: "OCI Cloud Server"
  api_port: 8004

features:
  scanner_enabled: true
  api_enabled: true
  frontend_enabled: true

mongodb:
  # Connection URI loaded from env var named below. Never commit a URI to git.
  uri_env: INFRADOCS_MONGO_URI
  database: infradocs

paths:
  # Dedicated root: every direct subfolder is treated as an application (classic).
  projects_root: /home/msinha/projects
  # Discovery is a DENY-LIST WALK FROM `/` (read via the container /host mount), not
  # an allow-list of blessed dirs — so an app installed under ANY top-level directory
  # (e.g. /data/<app>) is found without being named. In a container this reads the
  # host disk through the read-only /host bind.
  #
  # direct_roots: install roots whose DIRECT children are each an app even without a
  #   marker (/opt/<app>, /srv/<app>, /var/www/<site>). Complements the walk.
  # scan_roots:  roots recursively hunted for app markers (docker-compose.yml / .git).
  #   Default "/" = the whole disk; scan_exclusions filters the noise.
  # scan_exclusions: absolute host paths pruned during the walk (deny-list) — pseudo
  #   filesystems, boot, volatile caches/logs, image/package stores, and OS binary/
  #   library trees. /data, /opt, /srv, /home, /etc, /var/www, /usr/local, /mnt,
  #   /media all stay discoverable. Non-local mounts (nfs/tmpfs/overlay/…) are pruned
  #   automatically by fstype. Docker/systemd services are covered by their own scanners.
  # Override per-box without editing this file via INFRADOCS_DIRECT_ROOTS /
  # INFRADOCS_SCAN_ROOTS / INFRADOCS_SCAN_EXCLUSIONS (comma-separated).
  direct_roots:
    - /opt
    - /srv
    - /var/www
  scan_roots:
    - /
  scan_exclusions:
    - /proc
    - /sys
    - /dev
    - /run
    - /boot
    - /lost+found
    - /tmp
    - /var/tmp
    - /var/cache
    - /var/log
    - /var/spool
    - /var/lib/docker
    - /var/lib/containerd
    - /var/lib/snapd
    - /snap
    - /bin
    - /sbin
    - /lib
    - /lib32
    - /lib64
    - /libx32
    - /usr/bin
    - /usr/sbin
    - /usr/lib
    - /usr/lib32
    - /usr/lib64
    - /usr/libx32
    - /usr/libexec
    - /usr/share
    - /usr/include
    - /usr/src
    - /usr/games
  # How deep to descend under each root. From `/`, an app is one level deeper than
  # from a named root (/data/<app> is depth 2), so this is a touch higher than before.
  scan_depth: 4
  # Wall-clock cap (seconds) for the whole filesystem discovery pass; a walk from `/`
  # can never hang the pipeline. Set <=0 to disable.
  scan_timeout_seconds: 90
  data_root: /data/infradocs
  logs_dir: logs
  artifacts_dir: artifacts

scanning:
  schedule: "0 */6 * * *"
  timeout: 300
  enabled_scanners:
    - docker
    - compose
    - systemd
    - port
    - nginx
    - storage
    - cron
    - certs
    - caddy
    - cloudflared

logging:
  level: INFO
  format: json
  retention_days: 30

auth:
  username: msinha
  # password is read from env INFRADOCS_API_PASSWORD; falls back to dev default
  password_env: INFRADOCS_API_PASSWORD
  dev_password: msinha123

federation:
  # Priority-ranked gossip cluster with automatic failover (no shared DB).
  # Disabled by default — turn on only on a real multi-node tailnet fleet.
  cluster_enabled: false
  # Health-check every peer every 10s; a peer (or the primary) unheard-from for 30s
  # (3 missed rounds) is treated as down. A single missed round never fails over.
  health_interval_seconds: 10
  unreachable_after_seconds: 30
