# InfraDocs V6 Configuration — OCI-only
# V6 collapses V5's distributed architecture to a single host.
# Multi-server support will be reintroduced after V6 reaches production quality.

server:
  id: oci
  name: "OCI Cloud Server"
  api_port: 8004

features:
  scanner_enabled: true
  api_enabled: true
  frontend_enabled: true

mongodb:
  # Connection URI loaded from env var named below. Never commit a URI to git.
  uri_env: INFRADOCS_MONGO_URI
  database: infradocs

paths:
  # Dedicated root: every direct subfolder is treated as an application (classic).
  projects_root: /home/msinha/projects
  # Full-disk discovery so an app installed ANYWHERE shows up — not just ~/projects.
  # direct_roots: install-style roots where each direct child is an app
  #   (/opt/<app>, /srv/<app>, /var/www/<site>).
  # scan_roots:   broader roots recursively hunted for project markers
  #   (docker-compose.yml / .git) only — so /home/<user> and /etc don't each
  #   become an "app". Docker- and systemd-registered services are covered by
  #   their own scanners on top of this.
  # Override per-box without editing this file via INFRADOCS_DIRECT_ROOTS /
  # INFRADOCS_SCAN_ROOTS (comma-separated).
  direct_roots:
    - /opt
    - /srv
    - /var/www
  scan_roots:
    - /opt
    - /srv
    - /usr/local
    - /var/www
    - /home
    - /etc
  # How deep the marker hunt descends under each scan/direct root.
  scan_depth: 3
  # Wall-clock cap (seconds) for the whole filesystem discovery pass; a full-disk
  # scan can never hang the pipeline. Set <=0 to disable.
  scan_timeout_seconds: 120
  data_root: /data/infradocs
  logs_dir: logs
  artifacts_dir: artifacts

scanning:
  schedule: "0 */6 * * *"
  timeout: 300
  enabled_scanners:
    - docker
    - compose
    - systemd
    - port
    - nginx
    - storage
    - cron
    - certs
    - caddy
    - cloudflared

logging:
  level: INFO
  format: json
  retention_days: 30

auth:
  username: msinha
  # password is read from env INFRADOCS_API_PASSWORD; falls back to dev default
  password_env: INFRADOCS_API_PASSWORD
  dev_password: msinha123

federation:
  # Priority-ranked gossip cluster with automatic failover (no shared DB).
  # Disabled by default — turn on only on a real multi-node tailnet fleet.
  cluster_enabled: false
  # Health-check every peer every 10s; a peer (or the primary) unheard-from for 30s
  # (3 missed rounds) is treated as down. A single missed round never fails over.
  health_interval_seconds: 10
  unreachable_after_seconds: 30
